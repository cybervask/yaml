name: Go CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Code Quality (Linter)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.24' # Для проверки качества кода используем стабильную версию
          cache: true

      # Запуск официального GitHub Action для golangci-lint (Автоматически ставит v2)
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # Опционально: кэширование результатов линтера для ускорения последующих проверок
          only-new-issues: false

  test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: [] # Запускается параллельно с джобой линтера для экономии времени

    strategy:
      matrix:
        # Валидируем библиотеку на стабильных и актуальных версиях Go
        go-version: [ '1.24', '1.25', '1.26' ]

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true # Автоматически кэширует Go-модули

      - name: Install dependencies
        run: go mod download

      - name: Verify code formatting
        # Проверяем, что весь код отформатирован стандартным gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted with gofmt:"
            gofmt -l .
            exit 1
          fi

      - name: Execute Unit Tests
        # Запускаем unit-тесты с race-детектором и сбором покрытия (atomic)
        run: go test -v -race -covermode=atomic -coverprofile=coverage.txt ./...
