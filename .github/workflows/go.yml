name: Go CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Validate the library against current stable, patch, and cutting-edge Go editions
        go-version: [ '1.23', '1.24', '1.25', '1.26' ]

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true # Automatically caches Go modules to accelerate subsequent builds

      - name: Install dependencies
        run: go mod download

      - name: Verify code formatting
        # Assures all repository codebase files match official gofmt formatting styles.
        # If unformatted files exist, the pipeline execution sequence fails immediately.
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted with gofmt:"
            gofmt -l .
            exit 1
          fi

      - name: Execute Unit Tests
        # Triggers testing packages with active -race flags to eliminate thread race conditions
        # combined with verbose logging outputs and atomic coverage tracking metrics
        run: go test -v -race -covermode=atomic ./...
