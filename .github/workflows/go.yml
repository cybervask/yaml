name: Go CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Code Quality (Linter)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.25' # Используем старшую доступную версию для сборки линтера
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          only-new-issues: false
          # КРИТИЧЕСКИ ВАЖНО: компилируем линтер из исходников,
          # чтобы подружить его с версией 1.26 в вашем go.mod
          install-mode: goinstall

  test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: []

    strategy:
      matrix:
        go-version: [ '1.23', '1.24', '1.25' ]

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Verify code formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted with gofmt:"
            gofmt -l .
            exit 1
          fi

      - name: Execute Unit Tests
        run: go test -v -race -covermode=atomic -coverprofile=coverage.txt .
