run:
  timeout: 5m
  tests: true
  concurrency: 0

linters:
  disable-all: true
  enable:
    - govet        # Официальный анализатор Go (shadow, printf, struct tags)
    - errcheck     # Проверяет, что возвращаемые ошибки не игнорируются
    - staticcheck  # Набор проверок на логические ошибки и баги
    - revive       # Контроль стилистики и обязательного наличия GoDoc комментариев
    - gocritic     # Поиск микро-багов, специфичных для синтаксиса Go
    - misspell     # Проверка орфографии в кодовой базе и комментариях
    - unconvert    # Поиск избыточных приведений типов
    - ineffassign  # Обнаружение бесполезных присваиваний переменных

linters-settings:
  # Блок govet полностью удален, так как базовый запуск из коробки включает все проверки без конфликтов флагов

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - opinionated

  revive:
    ignore-generated-header: true
    severity: warning
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
      - name: package-comments
      - name: blank-imports
      - name: context-as-argument
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: increment-decrement
      - name: var-naming

  misspell:
    locale: US

issues:
  exclude-rules:
    - path: engine\.go
      linters:
        - gocyclo
    - path: _test\.go
      linters:
        - revive
      text: "exported: .* should have comment"
    - path: _test\.go
      linters:
        - errcheck
    - path: examples/.*
      linters:
        - revive
        - errcheck
